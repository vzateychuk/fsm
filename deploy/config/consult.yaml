recency:
  max_docs: 3          # сколько свежих документов включаем в recency bundle
  db_fetch_limit: 50   # запрашиваем из БД с запасом
  chunks_per_doc: 2    # первых N чанков (по chunk_no) берём из каждого свежего документа

bundle:
  max_total_chunks: 10   # итоговый лимит чанков в bundle (query + recency суммарно)
  max_total_chars: 15000 # лимит символов применяется ПОСЛЕ line-truncation (защита от взрыва)

excerpts:
  top_chunks_count: 3   # сколько чанков выводим в секции "Top Chunks" (первыми в промпте)
  top_chunks_lines: 8   # строк из каждого top-чанка в этой секции

  max_lines_default: 10 # строк по умолчанию для категорий без явного лимита
  max_chunk_chars: 1000    # макс. символов на чанк в промпте (0 = без лимита); применяется после line-truncation

  # Строчные лимиты по категориям; категории без явного лимита → max_lines_default
  category_line_limits:
    "Диагноз": 20
    "Операция": 20
    "Исследование": 20
    "Анализы": 20
    "Консультация": 20
    "Выписка": 20
