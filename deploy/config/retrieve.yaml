# Retrieval pipeline configuration
# Параметры для BM25-поиска и обработки результатов

# Количество строк BM25, которые SQLite возвращает до применения diversity-фильтра
# Должен быть >= limit; чем больше значение, тем точнее diversity, но дороже запрос
prelimit: 200

# Веса BM25 для четырёх индексированных колонок FTS5
# Порядок: [text, heading, section_path, tags_text]
# Больший вес — сильнее влияет на ранжирование
# text — основной сигнал релевантности (клинический текст чанка)
# heading — важен: заголовок секции сжато отражает тему
# section_path — структурный контекст, полезен для навигации, но не должен перевешивать text
# tags_text — структурные breadcrumb-слова из document title + section path;
#  полезны для диагнозных запросов по названию болезни, не для симптомных запросов
bm25_weights: [3.0, 2.0, 1.0, 1.5]

# Включить суффикс * (prefix match) для токенов в FTS5 MATCH-строке
# Если true, токен длиной >= prefix_min_len получает trailing wildcard:
# "протруз*" найдёт "протрузия", "протрузии" и т.д.
enable_prefixes: true

# Минимальная длина токена (в символах) для добавления prefix wildcard
# Короткие токены передаются в FTS5 как точное совпадение
prefix_min_len: 5

# Режим фильтрации по категории документа в SearchChunks:
# "soft" — категория из intent используется только для debug, SQL-фильтр не применяется
# "hard" — если intent определён, ограничивает поиск одной категорией
category_mode: "soft"

# Штраф на BM25 score для чанков с kind="meta" (административные секции)
# Примеры: 0.1 (10x penalty), 0.5 (2x penalty)
# Чанки с kind="meta" всё равно попадают в результаты, но ранжируются ниже клинического контента
meta_score_factor: 0.1

# Usage-параметры запроса — используются всеми компонентами (consult, chat)
# Максимальное число чанков из BM25-поиска по запросу
query_top_k: 20
# Не более N чанков из одного документа (diversity cap)
query_limit_per_document: 3
# Lookback period в днях от текущей даты для date window по умолчанию
lookback_days: 365
