services:
  api:
    image: vzateychuk/adviser-api:${ADVISER_IMAGE_TAG}
    env_file: .env
    environment:
      USER_DB_ROOT: /data/adviser/db
      SYSTEM_DB_PATH: /data/adviser/db/system.db
      LOG_FILE: /var/log/adviser/app.log
      AUTH_ENABLED: "true"
      COOKIE_SECURE: "false"
      HOST: "0.0.0.0"
      PORT: "8000"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${ADVISER_HOST_DATA_DIR}/db:/data/adviser/db
      - ${ADVISER_HOST_LOG_DIR}:/var/log/adviser
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    image: vzateychuk/adviser-web:${ADVISER_IMAGE_TAG}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    profiles: ["local"]
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped
