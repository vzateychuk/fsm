name: Publish Docker images

on:
  release:
    types: [published]

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/adviser-api:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/adviser-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/adviser-web:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/adviser-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
