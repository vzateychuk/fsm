retrieval:
  query_top_k: 20              # максимум чанков из BM25-поиска по запросу
  query_limit_per_document: 3  # не более N чанков из одного документа (разнообразие)

recency:
  max_docs: 3          # сколько свежих документов включаем в recency bundle
  max_age_days: 365    # документы старше этого числа дней не включаются
  db_fetch_limit: 50   # запрашиваем из БД с запасом, фильтруем по дате на клиенте
  chunks_per_doc: 2    # первых N чанков (по chunk_no) берём из каждого свежего документа

bundle:
  max_total_chunks: 15   # итоговый лимит чанков в bundle (query + recency суммарно)
  max_total_chars: 15000 # лимит символов применяется ПОСЛЕ line-truncation (защита от взрыва)

excerpts:
  top_chunks_count: 3   # сколько чанков выводим в секции "Top Chunks" (первыми в промпте)
  top_chunks_lines: 8   # строк из каждого top-чанка в этой секции

  max_lines_default: 20 # строк по умолчанию для категорий без явного лимита

  # Категории, для которых усечение строк НЕ применяется (полный текст чанка)
  full_text_categories:
    - "Консультация"
    - "Выписка"

  # Строчные лимиты для остальных категорий
  category_line_limits:
    "Диагноз": 60
    "Операция": 60
    "Исследование": 60
    "Анализы": 60
