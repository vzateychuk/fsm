# Configuration for LLM client (Ollama)

base_url: "https://integrate.api.nvidia.com/v1"  # OpenAI-compatible endpoint
api_key: ${NVIDIA_API_KEY}
model: "minimaxai/minimax-m2.7"

temperature: 0.1                            # Sampling temperature
top_p: 0.9                                  # Top-p (nucleus) sampling parameter
max_tokens: 8192                              # Maximum number of tokens to generate
num_ctx: 16384                                # Context window size for model
timeout: 60.0                             # Request timeout in seconds
