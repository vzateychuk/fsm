# Ingest pipeline configuration
# Параметры для обработки markdown документов

# Суффиксы "Дата …" — никогда не использовать как document_date (substring match после normalize_text).
# Пример: "рождения" отфильтрует "**Дата рождения:**".
date_suffix_hard_excluded:
  - "рождения"
  - "отправки"
  - "печати"

# Fallback: только если preferred-дата не найдена (порядок = приоритет).
# Добавьте новый суффикс сюда, чтобы использовать его как запасной источник даты документа.
# Пример: "забора" для "**Дата забора:**".
date_suffix_fallback:
  - "валидации"
  - "заказа"

# Regex для извлечения даты из stem имени файла (первая группа = YYYY-MM-DD или YYYYMMDD).
# Примеры: 2026-06-04_report.md, helix-lab-blood-minimax-20260604.md
filename_date_patterns:
  - '^(\d{4}-\d{2}-\d{2})[_\-]'
  - '(\d{8})$'

# Список heading'ов, которые классифицируются как административные секции.
# Эти секции получают kind="meta" и де-приоритизируются в search_chunks.
# Нормализация: lowercase + ё→е (применяется normalize_text перед сравнением).
# Максимальный размер секционного чанка (kind=section) в символах.
# При превышении секция бьётся по границам \n\n на несколько чанков.
# Не влияет на list/table/fact — они всегда хранятся целиком.
max_section_chars: 4000

admin_section_headings:
  - "информация о пациенте"
  - "информация о заказе"
  - "информация о пациенте и заказе"
  - "примечания"
  - "сведения об обследовании"
  - "информация об организации"
  - "дополнительно"
  - "дополнительная информация"
  - "аббревиатуры"
  - "metadata"
  - "учреждение"
  - "данные пациента"
  - "врач"
  - "информированное согласие"
  - "реквизиты"
