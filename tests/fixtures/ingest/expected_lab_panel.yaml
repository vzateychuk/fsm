# lab_panel.md — expected output for FSM v1.3 (block-based chunking)
# Примечания:
# - Chunking block-based: чанки создаются для paragraph/table/list блоков, а не для заголовков.
# - fact chunk == paragraph, начинающийся строго с "**Label**:".
# - metadata блока нет; финальные строки после '---' считаются обычным контентом и индексируются.
# - tags_text не содержит чисел/единиц вообще (но числа остаются в chunk.text и индексируются в поле text).

target_schema: lab

chunks_count: 17

chunk_kinds:
  # ## Общие сведения
  - section

  # ## Клинический анализ крови
  - table

  # ### Лейкоцитарная формула
  - list
  - fact          # **Вывод**: ...

  # ## Биохимический анализ
  # ### Белки
  - table
  - fact          # **Замечание**: ...

  # ### Ферменты печени
  - list
  - fact          # **Оценка**: ...

  # ### Углеводный обмен
  - section

  # ## Липидный профиль
  - table
  - fact          # **Заключение**: ...

  # ## Коагулограмма
  - list
  - fact          # **Вывод**: ...

  # ## Итоговая оценка
  - section

  # --- (разделитель) + финальные строки **Label**:
  - fact          # **Выполнил**: ...
  - fact          # **Дата**: ...
  - fact          # **Врач, назначивший анализ**: ...

section_paths_present:
  - клинический анализ крови и биохимия > общие сведения
  - клинический анализ крови и биохимия > клинический анализ крови
  - клинический анализ крови и биохимия > клинический анализ крови > лейкоцитарная формула
  - клинический анализ крови и биохимия > биохимический анализ > белки
  - клинический анализ крови и биохимия > биохимический анализ > ферменты печени
  - клинический анализ крови и биохимия > биохимический анализ > углеводный обмен
  - клинический анализ крови и биохимия > липидный профиль
  - клинический анализ крови и биохимия > коагулограмма
  - клинический анализ крови и биохимия > итоговая оценка

tags_text_contains:
  # системный токен schema
  - lab
  # структурные токены из заголовков/путей
  - анализ
  - крови
  - биохимия
  - клинический
  - лейкоцитарная
  - формула
  - белки
  - ферменты
  - печени
  - углеводный
  - обмен
  - липидный
  - профиль
  - коагулограмма
  - итоговая
  - оценка
  # доменные токены, встречающиеся в тексте (без чисел/единиц)
  - гемоглобин
  - эритроциты
  - лейкоциты
  - тромбоциты
  - альбумин
  - глобулины
  - аст
  - алт
  - ггт
  - щф
  - глюкоза
  - холестерин
  - лпвп
  - лпнп
  - триглицериды
  - протромбин
  - мно

edge_cases:
  description: >
    Проверяет комбинированный лабораторный документ: таблица + список + несколько fact-абзацев (**Вывод**/**Оценка**/**Заключение**)
    внутри разных веток заголовков. Также проверяет, что финальный блок после '---' с полями "**Выполнил**", "**Дата**",
    "**Врач, назначивший анализ**" индексируется как отдельные fact-чанки, а числа/единицы не попадают в tags_text.
  expects_fact_labels:
    - вывод
    - замечание
    - оценка
    - заключение
    - выполнил
    - дата
    - врач, назначивший анализ
  expects_lists:
    - лейкоцитарная формула
    - ферменты печени
    - коагулограмма
  expects_tables:
    - клинический анализ крови
    - белки
    - липидный профиль