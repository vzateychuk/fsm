# diagnostic_tables.md — expected output for FSM v1.3 (block-based chunking)
# Примечания:
# - Chunking block-based: чанки создаются для paragraph/table/list блоков, а не для заголовков.
# - fact chunk == paragraph, начинающийся строго с "**Label**:".
# - metadata блока нет; финальные строки после '---' считаются обычным контентом и индексируются.
# - tags_text не содержит чисел/единиц вообще (но числа остаются в chunk.text и индексируются в поле text).

target_schema: diagnostic

chunks_count: 13

chunk_kinds:
  # Под H1: шапка (строки с **Дата/Врач/Специальность/Аппарат** — это paragraph)
  - section

  # ## Подготовка пациента
  - section

  # ## Печень
  - section

  # ### Желчный пузырь
  - table
  - section        # "Контуры четкие, ровные."
  - fact           # **Заключение**: ...

  # ## Поджелудочная железа
  - section
  # ### Признаки нормы
  - list

  # ## Почки
  - table
  - section        # "Чашечно-лоханочная система ..."

  # ## Свободная жидкость
  - section

  # --- (разделитель) + две строки **Label**:
  - fact           # **Дата исследования**: ...
  - fact           # **Врач**: ...

section_paths_present:
  - узи диагностика органов брюшной полости > подготовка пациента
  - узи диагностика органов брюшной полости > печень
  - узи диагностика органов брюшной полости > печень > желчный пузырь
  - узи диагностика органов брюшной полости > поджелудочная железа
  - узи диагностика органов брюшной полости > поджелудочная железа > признаки нормы
  - узи диагностика органов брюшной полости > почки
  - узи диагностика органов брюшной полости > свободная жидкость

tags_text_contains:
  # системный токен schema
  - diagnostic
  # структурные токены из заголовков/путей
  - узи
  - диагностика
  - органы
  - брюшной
  - полости
  - подготовка
  - пациента
  - печень
  - желчный
  - пузырь
  - поджелудочная
  - железа
  - почки
  - свободная
  - жидкость
  # доменные токены, встречающиеся в тексте
  - эхогенность
  - желчнокаменная
  - болезнь
  - проток
  - мочеточники

edge_cases:
  description: >
    Проверяет смешанный раздел с таблицей + отдельным текстовым абзацем + отдельным fact (**Заключение**:)
    в пределах одной ветки заголовков (Печень -> Желчный пузырь). Также проверяет, что блок после '---'
    не считается metadata и индексируется как обычные fact-абзацы (**Дата исследования**:, **Врач**:).
  expects_fact_labels:
    - заключение
    - дата исследования
    - врач
  expects_lists:
    - признаки нормы
  expects_tables:
    - желчный пузырь
    - почки