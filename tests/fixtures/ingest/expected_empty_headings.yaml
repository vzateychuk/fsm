# empty_headings.md — expected output for FSM v1.3 (block-based chunking)
# Примечания:
# - Chunking block-based: чанки создаются для paragraph/table/list блоков, а не для заголовков.
# - fact chunk == paragraph, начинающийся строго с "**Label**:" (в этом документе fact нет).
# - metadata блока нет.
# - tags_text не содержит чисел/единиц вообще (но числа остаются в chunk.text и индексируются в поле text).

target_schema: diagnostic

chunks_count: 8

chunk_kinds:
  # ## Общая информация
  - section

  # ## УЗИ брахиоцефальных артерий (БЦА)
  # ### Общие данные
  - section
  # ### Правая ОСА
  - section
  # ### Левая ОСА
  - section

  # ## УЗИ почечных артерий
  # ### Правая почка
  - section
  # ### Левая почка
  - section

  # ## УЗИ нижней полой вены
  - section

  # ## Заключение
  - section

section_paths_present:
  - узи исследование артерий > общая информация
  - узи исследование артерий > узи брахиоцефальных артерий (бца) > общие данные
  - узи исследование артерий > узи брахиоцефальных артерий (бца) > правая оса
  - узи исследование артерий > узи брахиоцефальных артерий (бца) > левая оса
  - узи исследование артерий > узи почечных артерий > правая почка
  - узи исследование артерий > узи почечных артерий > левая почка
  - узи исследование артерий > узи нижней полой вены
  - узи исследование артерий > заключение

tags_text_contains:
  - diagnostic
  - узи
  - исследование
  - артерий
  - брахиоцефальных
  - бца
  - оса
  - почечных
  - почка
  - кровоток
  - заключение

edge_cases:
  description: >
    Проверяет, что заголовки без "вводного" текста не создают отдельные чанки:
    H3 (например "Правая ОСА") сразу ведёт к первому paragraph-чанку в соответствующем section_path.
    Также проверяет корректное построение section_path для H2→H3 ветвления и обработку сокращений в скобках (БЦА).
  asserts:
    no_tables_no_lists: true
    empty_heading_nodes_do_not_create_chunks: true
    parenthetical_abbreviation_in_heading: true